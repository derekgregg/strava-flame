<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flame - Activity Roasts</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>FLAME</h1>
      <p>Your group's activities, roasted mercilessly</p>
    </header>

    <div class="controls">
      <select id="filter-athlete">
        <option value="">All Athletes</option>
      </select>
      <select id="filter-sport">
        <option value="">All Sports</option>
        <option value="Ride">Ride</option>
        <option value="Run">Run</option>
        <option value="Walk">Walk</option>
        <option value="Hike">Hike</option>
        <option value="Swim">Swim</option>
        <option value="WeightTraining">Weights</option>
      </select>
      <select id="sort-by">
        <option value="start_date">Newest</option>
        <option value="distance">Distance</option>
        <option value="average_speed">Speed</option>
        <option value="moving_time">Duration</option>
        <option value="elevation_gain">Elevation</option>
      </select>
      <a href="/api/strava-auth" class="connect-btn">Connect Strava</a>
    </div>

    <div id="leaderboard">
      <div class="loading">Loading roasts...</div>
    </div>

    <footer>
      <a href="https://www.strava.com" target="_blank" rel="noopener">
        <img src="https://developers.strava.com/images/logos/api_logo_pwrdBy_strava_horiz_gray.svg" alt="Powered by Strava">
      </a>
    </footer>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
