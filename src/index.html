<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>Le Directeur</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>LE DIRECTEUR</h1>
      <p>Your brutally honest directeur sportif</p>
    </header>

    <nav id="user-nav" class="user-nav hidden">
      <span id="user-greeting"></span>
      <a href="/upload.html" class="nav-link">Add Activity</a>
      <a href="/settings.html" class="nav-link">Settings</a>
      <a href="/api/logout" class="nav-link">Log Out</a>
    </nav>

    <div id="controls" class="controls hidden">
      <select id="filter-user">
        <option value="">All Athletes</option>
      </select>
      <select id="filter-sport">
        <option value="">All Sports</option>
        <option value="Ride">Ride</option>
        <option value="Run">Run</option>
        <option value="Walk">Walk</option>
        <option value="Hike">Hike</option>
        <option value="Swim">Swim</option>
        <option value="WeightTraining">Weights</option>
      </select>
      <select id="sort-by">
        <option value="start_date">Newest</option>
        <option value="distance">Distance</option>
        <option value="average_speed">Speed</option>
        <option value="moving_time">Duration</option>
        <option value="elevation_gain">Elevation</option>
      </select>
    </div>

    <div id="leaderboard">
      <div class="loading">Loading commentary...</div>
    </div>

    <div id="logged-out-cta" class="empty-state hidden">
      <p>Sign in to upload activities and get brutally honest commentary from Le Directeur.</p>
      <a href="/api/google-auth" class="connect-btn google-btn" style="margin-top: 16px;">Sign in with Google</a>
    </div>

    <footer>
      <div id="strava-logo" class="footer-logos hidden">
        <a href="https://www.strava.com" target="_blank" rel="noopener">
          <img src="/images/api_logo_pwrdBy_strava_horiz_white.svg" alt="Powered by Strava">
        </a>
      </div>
      <a href="/privacy.html" class="footer-link">Privacy Policy</a>
      <span class="footer-sep">·</span>
      <a href="#" class="footer-link" id="report-bug-link">Report a Bug</a>
    </footer>

    <div id="bug-modal" class="modal hidden">
      <div class="modal-content">
        <h3>Report a Bug</h3>
        <div class="settings-field">
          <label for="bug-title">What went wrong?</label>
          <input type="text" id="bug-title" placeholder="e.g. Upload fails on large files">
        </div>
        <div class="settings-field">
          <label for="bug-description">Details <span class="text-muted">(optional)</span></label>
          <textarea id="bug-description" rows="3" placeholder="Steps to reproduce, what you expected, etc."></textarea>
        </div>
        <div class="modal-actions">
          <button id="bug-submit" class="connect-btn">Submit</button>
          <button id="bug-cancel" class="connect-btn" style="background: var(--surface); border: 1px solid var(--border);">Cancel</button>
        </div>
        <div id="bug-status"></div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
